<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBAC - Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-shield-halved" style="color: var(--accent-color); margin-right: 10px;"></i>RBAC System</h2>
                <p style="font-size: 0.8rem;" id="adminNameDisplay">Loading...</p>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" id="navUsers"><i class="fa-solid fa-users"></i> Users Management</a>
                <a href="#" class="nav-item" id="navLogs"><i class="fa-solid fa-clipboard-list"></i> Activity Logs</a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-item" onclick="logout()" style="color: var(--danger-color)"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search users by name or email...">
                </div>
                <button class="btn btn-primary" id="addUserBtn">
                    <i class="fa-solid fa-plus" style="margin-right: 8px;"></i> Add New User
                </button>
            </header>

            <div id="usersView">
                <div class="stats-grid">
                    <div class="glass-panel stat-card">
                        <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
                        <div class="stat-info">
                            <h3>Total Users</h3>
                            <p id="statTotal">--</p>
                        </div>
                    </div>
                    <div class="glass-panel stat-card">
                        <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: var(--success-color);"><i class="fa-solid fa-user-check"></i></div>
                        <div class="stat-info">
                            <h3>Active Users</h3>
                            <p id="statActive">--</p>
                        </div>
                    </div>
                    <div class="glass-panel stat-card">
                        <div class="stat-icon" style="background: rgba(139, 92, 246, 0.1); color: #a78bfa;"><i class="fa-solid fa-user-shield"></i></div>
                        <div class="stat-info">
                            <h3>Admin Users</h3>
                            <p id="statAdmin">--</p>
                        </div>
                    </div>
                </div>

                <div class="glass-panel table-container">
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Permissions (R / W / U / D)</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="logsView" style="display: none;">
                <h2>System Activity Logs</h2>
                <div class="glass-panel table-container" style="margin-top: 1.5rem;">
                    <table>
                        <thead>
                            <tr>
                                <th>Date & Time</th>
                                <th>Action</th>
                                <th>User ID / Initiator</th>
                                <th>Details</th>
                            </tr>
                        </thead>
                        <tbody id="logsTableBody">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- JSON Editor Modal -->
    <div class="modal-overlay" id="jsonModal">
        <div class="glass-panel modal-content">
            <div class="modal-header">
                <h2>Edit User Details (JSON)</h2>
                <button class="modal-close" onclick="closeModals()"><i class="fa-solid fa-times"></i></button>
            </div>
            <textarea class="json-editor" id="jsonEditorInput"></textarea>
            <div id="jsonError" class="error-text" style="display: none; margin-bottom: 1rem;"></div>
            <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                <button class="btn" onclick="closeModals()" style="background: transparent; border: 1px solid var(--panel-border); color: white;">Cancel</button>
                <button class="btn btn-primary" id="saveJsonBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal-overlay" id="addUserModal">
        <div class="glass-panel modal-content">
            <div class="modal-header">
                <h2>Add New User</h2>
                <button class="modal-close" onclick="closeModals()"><i class="fa-solid fa-times"></i></button>
            </div>
            <form id="addUserForm">
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" id="addName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="addEmail" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="addPassword" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Role</label>
                    <select id="addRole" class="form-input" style="background: #1e293b; color: white;">
                        <option value="User">User</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div id="addError" class="error-text" style="display: none; margin-bottom: 1rem;"></div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" class="btn" onclick="closeModals()" style="background: transparent; border: 1px solid var(--panel-border); color: white;">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create User</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
